<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">

    <!-- RESPONSIVE -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO -->
    <meta name="description" content="Calculateur BEPC Côte d'Ivoire">

    <!-- ADSENSE -->
    <script async 
        src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1014785724497316"
        crossorigin="anonymous"></script>

    <title>Calculateur BEPC</title>

    <link rel="stylesheet" href="index.css">
</head>

<body>

<!-- ================= POPUP PUB ================= -->
<div id="popupPub" class="popup-overlay">
    <div class="popup-content">

        <span class="popup-close" onclick="fermerPub()">✖</span>

        <p class="popup-title">Annonce sponsorisée</p>

        <ins class="adsbygoogle"
            style="display:block"
            data-ad-client="ca-pub-1014785724497316"
            data-ad-slot="9937918976"
            data-ad-format="auto"
            data-full-width-responsive="true"></ins>

    </div>
</div>

<!-- ================= HEADER ================= -->
<header>
    <div class="haut">

        <img src="images/images.png" class="logo">

        <div class="header-text">
            <h1>Moyenne d'Orientation - BEPC</h1>
            <p class="subtitle">Calcul rapide et fiable</p>
        </div>

        <div class="profil-header">
            <img src="images/MA_PHOTO-removebg-preview.png" class="photo-profil">
            <span class="profil-nom">L'BOSS ISSA</span>
        </div>

    </div>
</header>

<main>

    <h2>Informations</h2>

    <div class="boite">

        <div class="champ">
            <label>Prénom</label>
            <input id="prenom" class="champ-input">
        </div>

        <div class="champ">
            <label>Nom</label>
            <input id="nom" class="champ-input">
        </div>

    </div>

    <h2>Calcul</h2>

    <div class="table-container">
        <table>

            <thead>
                <tr>
                    <th>Matière</th>
                    <th>T1</th>
                    <th>T2</th>
                    <th>T3</th>
                    <th>Moy</th>
                    <th>BEPC</th>
                    <th>Coef</th>
                </tr>
            </thead>

            <tbody>

                <tr>
                    <td>Français</td>
                    <td><input type="number"></td>
                    <td><input type="number"></td>
                    <td><input type="number"></td>
                    <td></td>
                    <td><input type="number"></td>
                    <td>2</td>
                </tr>

                <tr>
                    <td>Maths</td>
                    <td><input type="number"></td>
                    <td><input type="number"></td>
                    <td><input type="number"></td>
                    <td></td>
                    <td><input type="number"></td>
                    <td>2</td>
                </tr>

            </tbody>

        </table>
    </div>

    <button onclick="calculer()">Calculer</button>

    <h3>Moyenne : <span id="resultat">0</span></h3>

</main>

<!-- ================= SCRIPT ================= -->
<script>

// PUB
window.onload = function() {
    (adsbygoogle = window.adsbygoogle || []).push({});
}

function fermerPub(){
    document.getElementById("popupPub").style.display = "none";
}

// CALCUL
function calculer(){

    let lignes = document.querySelectorAll("tbody tr");
    let total = 0;
    let coefTotal = 0;

    lignes.forEach(ligne => {

        let inputs = ligne.querySelectorAll("input");

        let t1 = parseFloat(inputs[0].value) || 0;
        let t2 = parseFloat(inputs[1].value) || 0;
        let t3 = parseFloat(inputs[2].value) || 0;

        let moyenne = (t1 + t2 + t3) / 3;

        let bepc = parseFloat(inputs[3].value) || 0;

        let coef = parseFloat(ligne.cells[6].textContent);

        let note = ((moyenne + bepc)/2) * coef;

        total += note;
        coefTotal += coef;

        ligne.cells[4].textContent = moyenne.toFixed(2);
    });

    let final = total / coefTotal;

    document.getElementById("resultat").textContent = final.toFixed(2);
}

</script>

</body>
</html>
