<main>

    <h2>Calcul de la moyenne</h2>

    <table border="1">
        <thead>
            <tr>
                <th>Matière</th>
                <th>T1</th>
                <th>T2</th>
                <th>T3</th>
                <th>Moyenne</th>
                <th>BEPC</th>
                <th>Coef</th>
            </tr>
        </thead>

        <tbody>

            <tr>
                <td>Français</td>
                <td><input type="number"></td>

        </tbody>

    <br>

    <button id="calculer">Calculer</button>

<!-- JS CALCUL -->
<script>
document.getElementById("calculer").onclick = function(){

    let lignes = document.querySelectorAll("tbody tr");
    let total = 0;
    let coefTotal = 0;

    lignes.forEach(ligne => {

        let inputs = ligne.querySelectorAll("input");

        let t1 = parseFloat(inputs[0].value) || 0;
        let t2 = parseFloat(inputs[1].value) || 0;
        let t3 = parseFloat(inputs[2].value) || 0;

        let moyenne = (t1 + t2 + t3) / 3;

        let bepc = parseFloat(inputs[3].value) || 0;

        let coef = parseFloat(ligne.cells[6].textContent);

        let note = ((moyenne + bepc)/2) * coef;

        total += note;
        coefTotal += coef;

        ligne.cells[4].textContent = moyenne.toFixed(2);
    });

    let final = total / coefTotal;

    document.getElementById("resultat").textContent = final.toFixed(2);
}
</script>
